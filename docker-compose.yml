services:
  postgres:
    image: postgres:15
    env_file:
      - ./envs/docker.env
    volumes:
      - postgres-data:/var/lib/postgresql/data/
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_USER: assa
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ecommercedb
    ports:
      - "5432:5432"

  api:
    build: .
    env_file:
      - ./envs/docker.env
    ports:
      - "3000:3000"
    depends_on:
      - postgres

volumes:
  postgres-data:
